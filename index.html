<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Waste Management Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
  color: #e2e8f0;
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #0f172a 0%, #1a2240 100%);
  color: white;
  padding: 28px 40px;
  text-align: left;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid rgba(102, 126, 234, 0.2);
  backdrop-filter: blur(10px);
}

header::before {
  content: "♻️";
  font-size: 28px;
  margin-right: 12px;
}

header::after {
  content: "Real-time Monitoring";
  font-size: 12px;
  font-weight: 400;
  opacity: 0.7;
  letter-spacing: 1px;
}

/* MAIN LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1.9fr 1fr;
  gap: 24px;
  padding: 32px 40px;
  height: 92vh;
}

/* LEFT ZONES */
.left {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  overflow-y: auto;
  padding-right: 16px;
}

.left::-webkit-scrollbar {
  width: 8px;
}

.left::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.left::-webkit-scrollbar-thumb {
  background: rgba(102, 126, 234, 0.4);
  border-radius: 10px;
}

.left::-webkit-scrollbar-thumb:hover {
  background: rgba(102, 126, 234, 0.6);
}

/* ZONE CARD */
.zone {
  background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(102, 126, 234, 0.1);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
}

.zone::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
}

.zone::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.zone:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.2);
  border-color: rgba(102, 126, 234, 0.3);
  background: linear-gradient(135deg, rgba(38, 55, 85, 0.9) 0%, rgba(20, 30, 55, 0.95) 100%);
}

.zone-title {
  font-weight: 800;
  font-size: 17px;
  margin-bottom: 14px;
  color: #e2e8f0;
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

.zone-title::before {
  content: "📦";
  font-size: 20px;
}

/* BINS */
.bin-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  position: relative;
  z-index: 1;
  flex: 1;
}

.bin {
  height: 38px;
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(100, 116, 139, 0.3) 0%, rgba(71, 85, 105, 0.2) 100%);
  border: 2px solid rgba(148, 163, 184, 0.2);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #cbd5e1;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
  min-width: 0;
  padding: 0;
}

.bin:hover {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.3) 100%);
  border-color: rgba(102, 126, 234, 0.6);
  transform: scale(1.08);
  box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
  color: #e2e8f0;
}

/* RIGHT PANEL */
.right {
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
  padding-right: 16px;
}

.right::-webkit-scrollbar {
  width: 8px;
}

.right::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.right::-webkit-scrollbar-thumb {
  background: rgba(102, 126, 234, 0.4);
  border-radius: 10px;
}

/* CARD */
.card {
  background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(102, 126, 234, 0.1);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -50%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.card:hover {
  box-shadow: 0 16px 48px rgba(102, 126, 234, 0.2);
  border-color: rgba(102, 126, 234, 0.2);
  transform: translateY(-2px);
}

/* MAP */
#map {
  height: 420px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(102, 126, 234, 0.1);
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
}

/* TITLES */
.card-title {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 18px;
  color: #e2e8f0;
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
}

.card-title::before {
  content: "";
  width: 4px;
  height: 24px;
  background: linear-gradient(180deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  border-radius: 2px;
}

/* PROGRESS BAR */
.bar {
  height: 12px;
  background: rgba(71, 85, 105, 0.3);
  border-radius: 999px;
  overflow: hidden;
  margin: 10px 0;
  border: 1px solid rgba(102, 126, 234, 0.1);
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  border-radius: 999px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
}

/* LABEL */
.label {
  font-size: 13px;
  color: #cbd5e1;
  margin-top: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.label-value {
  color: #667eea;
  font-weight: 700;
  font-size: 14px;
}

/* SMALL BADGE */
.badge {
  display: inline-block;
  padding: 8px 14px;
  font-size: 11px;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.15) 100%);
  color: #a5b4fc;
  border-radius: 999px;
  margin-bottom: 14px;
  font-weight: 700;
  border: 1px solid rgba(102, 126, 234, 0.3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
}
</style>
</head>

<body>

<header>
Smart Waste Management System — Dhaka City (Thesis Dashboard)
</header>

<div class="container">

<!-- LEFT -->
<div class="left" id="zones"></div>

<!-- RIGHT -->
<div class="right">

  <div class="card">
    <div class="card-title">📊 Zone-wise Waste Overview</div>

    <div style="display: flex; align-items: center; justify-content: space-between;">
      <div class="label">Zone 1</div>
      <span style="color: #667eea; font-weight: 700; font-size: 12px;">0%</span>
    </div>
    <div class="bar"><div class="fill"></div></div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 14px;">
      <div class="label">Zone 2</div>
      <span style="color: #667eea; font-weight: 700; font-size: 12px;">0%</span>
    </div>
    <div class="bar"><div class="fill"></div></div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 14px;">
      <div class="label">Zone 3</div>
      <span style="color: #667eea; font-weight: 700; font-size: 12px;">0%</span>
    </div>
    <div class="bar"><div class="fill"></div></div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 14px;">
      <div class="label">Zone 4</div>
      <span style="color: #667eea; font-weight: 700; font-size: 12px;">0%</span>
    </div>
    <div class="bar"><div class="fill"></div></div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 14px;">
      <div class="label">Zone 5</div>
      <span style="color: #667eea; font-weight: 700; font-size: 12px;">0%</span>
    </div>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <div class="card" style="flex: 1; min-height: 300px;">
    <div class="card-title">🚛 Truck Dispatch & Tracking</div>
    <div id="dispatch-list" style="max-height: 250px; overflow-y: auto; font-size: 12px;"></div>
  </div>

  <div class="card" style="flex: 2; min-height: 400px;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 14px;">
      <div class="card-title" style="margin: 0;">📍 Map</div>
    </div>
    <div id="map" style="height: 350px; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0;"></div>
  </div>

</div>

</div>

<script>

/* ZONE DATA */
let zonesData = [
  {zone: 1, center: {lat:23.88, lng:90.38}},
  {zone: 2, center: {lat:23.75, lng:90.41}},
  {zone: 3, center: {lat:23.80, lng:90.48}},
  {zone: 4, center: {lat:23.78, lng:90.35}},
  {zone: 5, center: {lat:23.81, lng:90.42}}
];

let binsData = [];

/* GENERATE BIN LOCATIONS */
zonesData.forEach(zoneData => {
  for (let b = 1; b <= 10; b++) {
    let offsetLat = (Math.random() - 0.5) * 0.08;
    let offsetLng = (Math.random() - 0.5) * 0.08;
    
    binsData.push({
      id: `Z${zoneData.zone}B${b}`,
      zone: zoneData.zone,
      binNum: b,
      lat: zoneData.center.lat + offsetLat,
      lng: zoneData.center.lng + offsetLng
    });
  }
});

/* LEFT ZONES */
let zones = document.getElementById("zones");

for (let z = 1; z <= 5; z++) {
  let zone = document.createElement("div");
  zone.className = "zone";

  let html = `<div class="zone-title">Zone ${z}</div>
              <div class="bin-grid">`;

  for (let b = 1; b <= 10; b++) {
    html += `<div class="bin">B${b}</div>`;
  }

  html += `</div>`;
  zone.innerHTML = html;
  zones.appendChild(zone);
}

/* MAP */
var map = L.map('map').setView([23.8103, 90.4125], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

/* ADD ZONE CIRCLES AND CENTERS */
zonesData.forEach(z => {
  L.circle([z.center.lat, z.center.lng], {
    radius: 4500,
    fillOpacity: 0.1,
    weight: 2
  }).addTo(map).bindPopup(`<b>Zone ${z.zone}</b>`);

  L.marker([z.center.lat, z.center.lng], {
    icon: L.icon({
      iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" stroke="%23667eea" stroke-width="2"><path d="M12 2C7 2 3 6 3 11c0 7 9 13 9 13s9-6 9-13c0-5-4-9-9-9z"/><circle cx="12" cy="11" r="3" fill="%23667eea"/></svg>',
      iconSize: [32, 32]
    })
  }).addTo(map).bindPopup(`<b>Zone ${z.zone} Center</b>`);
});

/* ADD BIN MARKERS */
binsData.forEach(bin => {
  let icon = L.icon({
    iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2367b3ed"><rect x="4" y="3" width="16" height="18" rx="2"/></svg>',
    iconSize: [20, 20]
  });

  L.marker([bin.lat, bin.lng], {icon: icon})
    .addTo(map)
    .bindPopup(`<b>${bin.id}</b>`);
});

/* TRUCK MARKERS */
let trucks = [
  {id: "T1", lat: 23.85, lng: 90.40, zone: 1, status: "Active", color: "#22c55e"},
  {id: "T2", lat: 23.78, lng: 90.42, zone: 3, status: "Active", color: "#22c55e"},
  {id: "T3", lat: 23.80, lng: 90.38, zone: 5, status: "Idle", color: "#94a3b8"}
];

let truckMarkers = [];

trucks.forEach(truck => {
  let marker = L.marker([truck.lat, truck.lng], {
    icon: L.icon({
      iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="' + truck.color.replace('#', '%23') + '"><path d="M18 18.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0ZM9 18.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0Z"/><path d="M19 4a1 1 0 00-1-1h-5a1 1 0 00-1 1v10H5a1 1 0 00-1 1v3h2a3 3 0 006 0h2a3 3 0 006 0h2v-3a1 1 0 00-1-1h-8V4z"/></svg>',
      iconSize: [28, 28]
    })
  }).addTo(map).bindPopup(`<b>${truck.id}</b><br>Zone: ${truck.zone}<br>Status: ${truck.status}`);
  
  truckMarkers.push({marker, truck});
});

/* UPDATE DISPATCH LIST */
function updateDispatchList() {
  let dispatchList = document.getElementById('dispatch-list');
  dispatchList.innerHTML = '<div style="padding: 12px; text-align: center; color: #6b7280; font-weight: 500;">Awaiting data...</div>';
}

updateDispatchList();

/* ANIMATE TRUCKS */
// Truck animation disabled

</script>

</body>
</html>
