
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Waste Management Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f8ff;
  --surface: #ffffff;
  --surface-2: #f3f5ff;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #475569;
  --border: rgba(15, 23, 42, 0.10);
  --shadow: rgba(15, 23, 42, 0.10);

  /* Bright, modern accents */
  --accent: #ff2d78;     /* pink */
  --accent-2: #7c3aed;   /* purple */
  --accent-3: #06b6d4;   /* cyan */

  --danger: #e11d48;
  --warning: #f59e0b;
  --success: #16a34a;
  --ring: rgba(37, 99, 235, 0.22);

  /* Readability on deep backgrounds */
  --page-text: rgba(248, 250, 252, 0.92);
  --page-muted: rgba(226, 232, 240, 0.72);
}

* {
  box-sizing: border-box;
}

body {
  background:
    radial-gradient(1100px 620px at 10% 0%, rgba(255, 45, 120, 0.22), transparent 60%),
    radial-gradient(1000px 700px at 95% 10%, rgba(124, 58, 237, 0.18), transparent 58%),
    radial-gradient(900px 780px at 70% 100%, rgba(6, 182, 212, 0.16), transparent 55%),
    radial-gradient(900px 500px at 20% 70%, rgba(34, 197, 94, 0.10), transparent 60%),
    linear-gradient(180deg, #070a1a 0%, #0b1030 52%, #0b1233 100%);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  margin: 0;
  padding: 0;
  line-height: 1.6;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.72));
  border-bottom: 1px solid rgba(15, 23, 42, 0.10);
  color: var(--text);
}

.topbar-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-icon {
  width: 40px;
  height: 40px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: linear-gradient(90deg, rgba(255, 45, 120, 0.28), rgba(124, 58, 237, 0.20), rgba(6, 182, 212, 0.18));
  border: 1px solid rgba(15, 23, 42, 0.10);
  box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
  color: var(--text);
}

.brand-title {
  font-weight: 800;
  font-size: 20px;
  line-height: 1.2;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.brand-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid rgba(15, 23, 42, 0.10);
  background: rgba(255, 255, 255, 0.75);
  color: var(--muted);
  font-size: 13px;
  box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
}

.pill strong {
  color: var(--text);
  font-weight: 600;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
  margin: 18px 0 18px;
}

.stat-item {
  grid-column: span 4;
  background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.70));
  padding: 18px 18px;
  border-radius: 16px;
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.10);
  border: 1px solid rgba(15, 23, 42, 0.08);
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.stat-item::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
  opacity: 0.95;
}

.stat-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 22px 44px rgba(15, 23, 42, 0.12);
}

.stat-label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.stat-value {
  font-weight: 700;
  color: var(--text);
  font-size: 24px;
  letter-spacing: -0.02em;
}

.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(15, 23, 42, 0.10);
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.10), rgba(124, 58, 237, 0.08));
  color: var(--text);
}

.page-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.toolbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.btn {
  appearance: none;
  border: 0;
  cursor: pointer;
  border-radius: 14px;
  font-family: inherit;
  font-weight: 600;
  letter-spacing: -0.01em;
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}

.btn:active {
  transform: translateY(1px);
}

.btn-primary {
  padding: 12px 14px;
  color: white;
  background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
  box-shadow: 0 16px 30px rgba(37, 99, 235, 0.20);
}

.btn-primary:hover {
  filter: saturate(1.05);
  box-shadow: 0 18px 36px rgba(37, 99, 235, 0.24);
}

.btn-primary i {
  margin-right: 8px;
}

.btn-ghost {
  padding: 10px 12px;
  color: var(--text);
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(15, 23, 42, 0.10);
  box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
}

/* Modal (Zones Overview) */

.panel {
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 18px;
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.10);
  overflow: hidden;
  position: relative;
}

.panel::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-3), var(--accent), var(--accent-2));
  opacity: 0.9;
}

.panel-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), rgba(124, 58, 237, 0.04));
}

.panel-title {
  margin: 0;
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.01em;
}

.panel-title i {
  color: var(--accent);
}

.panel-body {
  padding: 16px;
}

.zone {
  background: rgba(255,255,255,0.70);
  margin-bottom: 16px;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  transition: transform 0.15s ease, background 0.15s ease;
}

.zone:hover {
  transform: translateY(-1px);
  background: rgba(255,255,255,0.86);
}

.zone-title {
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--text);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.zone-title i {
  margin-right: 0;
  color: var(--accent);
}

.zone-title-left {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.zone-badge {
  font-size: 12px;
  color: var(--muted);
  border: 1px solid rgba(15, 23, 42, 0.10);
  background: rgba(255,255,255,0.85);
  padding: 6px 10px;
  border-radius: 999px;
}

.bin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

.bin {
  background: rgba(255,255,255,0.90);
  padding: 14px;
  border-radius: 16px;
  border: 1px solid rgba(15, 23, 42, 0.10);
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  position: relative;
  overflow: hidden;
}

.bin:hover {
  transform: translateY(-2px);
  box-shadow: 0 22px 44px rgba(15, 23, 42, 0.14);
}

.bin.high {
  border-color: rgba(225, 29, 72, 0.38);
}

.bin.medium {
  border-color: rgba(245, 158, 11, 0.38);
}

.bin.low {
  border-color: rgba(37, 99, 235, 0.28);
}

.bin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  font-weight: 600;
  color: var(--text);
  font-size: 13px;
}

.severity {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid rgba(15, 23, 42, 0.10);
  background: rgba(255,255,255,0.85);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.bin.high .severity {
  color: var(--danger);
  border-color: rgba(225, 29, 72, 0.30);
  background: rgba(225, 29, 72, 0.08);
}

.bin.medium .severity {
  color: var(--warning);
  border-color: rgba(245, 158, 11, 0.30);
  background: rgba(245, 158, 11, 0.10);
}

.bin.low .severity {
  color: var(--accent);
  border-color: rgba(37, 99, 235, 0.26);
  background: rgba(37, 99, 235, 0.08);
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
}

.bar-label {
  width: 78px;
  font-size: 12px;
  color: var(--muted);
}

.bar-value {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.waste-bar {
  height: 10px;
  background: rgba(15, 23, 42, 0.08);
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  flex: 1;
}

.fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.8s ease;
}

.paper { background: linear-gradient(90deg, #f97316, #f59e0b); }
.plastic { background: linear-gradient(90deg, #2563eb, #06b6d4); }
.metal { background: linear-gradient(90deg, #64748b, #94a3b8); }
.organic { background: linear-gradient(90deg, #22c55e, #16a34a); }
.total_average { background: linear-gradient(90deg, #7c3aed, #2563eb); }

.dispatch {
  margin-bottom: 16px;
}

.dispatch h3 {
  margin-top: 0;
  color: var(--text);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.dispatch h3 i {
  margin-right: 8px;
}

#dispatch-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.dispatch-item {
  background: rgba(255,255,255,0.88);
  padding: 12px 12px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s ease, transform 0.15s ease;
  border: 1px solid rgba(15, 23, 42, 0.10);
  gap: 12px;
}

.dispatch-item:hover {
  background: rgba(255,255,255,0.96);
  transform: translateY(-1px);
}

.priority-high {
  color: var(--danger);
  font-weight: 600;
}

.priority-medium {
  color: var(--warning);
  font-weight: 600;
}

.priority-low {
  color: var(--success);
  font-weight: 600;
}

#map {
  height: 450px;
  width: 100%;
  min-height: 450px;
  border-radius: 18px;
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
  border: 1px solid rgba(15, 23, 42, 0.10);
  overflow: hidden;
}

/* Loading Animation */
.loading {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(15, 23, 42, 0.10);
  border-top: 3px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Leaflet tweaks to match theme */
.leaflet-container {
  background: rgba(255,255,255,0.90);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.leaflet-control-attribution {
  background: rgba(255, 255, 255, 0.88) !important;
  color: rgba(15, 23, 42, 0.72) !important;
  border: 1px solid rgba(15, 23, 42, 0.10) !important;
  border-radius: 10px !important;
  padding: 6px 8px !important;
  backdrop-filter: blur(8px);
}

.leaflet-control-attribution a {
  color: rgba(37, 99, 235, 0.95) !important;
}

/* Responsive Design */
@media (max-width: 768px) {
  .container {
    padding: 16px;
  }
  
  .topbar-inner {
    padding: 14px 16px;
  }

  .brand-title {
    font-size: 16px;
  }

  .brand-subtitle {
    display: none;
  }

  .stats {
    grid-template-columns: 1fr;
  }
  
  .stat-item {
    grid-column: 1 / -1;
  }

  .toolbar-row {
    flex-direction: column;
    align-items: stretch;
  }
  
  .bin-grid {
    grid-template-columns: 1fr;
  }
  
  .zone-title {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true"><i class="fas fa-recycle"></i></div>
      <div style="min-width:0;">
        <div class="brand-title">Smart Waste Management Dashboard</div>
        <div class="brand-subtitle">Dhaka City • Real-time bin fill levels & dispatch recommendations</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="pill"><i class="fas fa-signal"></i> <strong>Live</strong> updates</div>
      <div class="pill"><i class="fas fa-rotate"></i> every <strong>3s</strong></div>
    </div>
  </div>
</div>

<div class="container">

<div class="stats">
  <div class="stat-item">
    <div>
      <div class="stat-label">Daily waste generated in Dhaka</div>
      <div class="stat-value" id="daily-generated">-- kg</div>
    </div>
    <div class="stat-icon" aria-hidden="true"><i class="fas fa-scale-balanced"></i></div>
  </div>
</div>

<div class="page-stack">
  <div class="toolbar-row">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <a class="btn btn-primary" href="zones-info.html" role="button">
        <i class="fas fa-location-dot"></i> Zones info
      </a>
      <a class="btn btn-ghost" href="zones.html" role="button">
        <i class="fas fa-chart-column"></i> Zones levels
      </a>
    </div>
  </div>

  <div class="panel dispatch">
    <div class="panel-header">
      <h2 class="panel-title"><i class="fas fa-truck"></i> Dispatch recommendations</h2>
      <div class="pill" style="box-shadow:none;"><i class="fas fa-route"></i> Priority first</div>
    </div>
    <div class="panel-body">
      <div id="dispatch-list">
        <div class="loading"></div> Loading...
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2 class="panel-title"><i class="fas fa-map-location-dot"></i> Map</h2>
      <div class="pill" style="box-shadow:none;"><i class="fas fa-location-crosshairs"></i> Dhaka</div>
    </div>
    <div class="panel-body" style="padding:0;">
      <div id="map"></div>
    </div>
  </div>
</div>

</div>

<script>

const API = "http://127.0.0.1:5000";

let binsData = [];

/* FETCH DATA */
async function fetchData() {
  try {
    let res = await fetch(API + "/bins");
    binsData = await res.json();

    renderDispatch();
    fetchStats();
  } catch (error) {
    console.error("Error fetching data:", error);
    document.getElementById("dispatch-list").innerHTML = "Error loading data. Please check if the server is running.";
  }
}

/* FETCH STATS */
async function fetchStats() {
  try {
    let res = await fetch(API + "/stats");
    let data = await res.json();
    document.getElementById("daily-generated").textContent = data.daily_generated + " kg";
  } catch (error) {
    console.error("Error fetching stats:", error);
  }
}

/* CREATE BAR */
function bar(value, cls, label) {
  return `
  <div class="bar-row">
    <span class="bar-label">${label}</span>
    <div class="waste-bar">
      <div class="fill ${cls}" style="width:${value}%"></div>
    </div>
    <span class="bar-value">${value}%</span>
  </div>`;
}

/* DISPATCH */
async function renderDispatch() {
  try {
    let res = await fetch(API + "/dispatch");
    let data = await res.json();

    let div = document.getElementById("dispatch-list");

    if (data.length === 0) {
      div.innerHTML = "✅ No urgent bins at the moment";
      return;
    }

    div.innerHTML = data.map(d => `
      <div class="dispatch-item">
        <span>${d.id} (Zone ${d.zone})</span>
        <span class="priority-${d.priority.toLowerCase()}">${d.priority} (${d.fill_percentage}%)</span>
      </div>
    `).join("");
  } catch (error) {
    console.error("Error fetching dispatch:", error);
    document.getElementById("dispatch-list").innerHTML = "Error loading dispatch data.";
  }
}

/* AUTO UPDATE */
setInterval(fetchData, 3000);
fetchData();

/* MAP */
let map;

function initMap() {
  const mapEl = document.getElementById("map");
  if (!mapEl) return;
  if (typeof L === "undefined") {
    console.error("Leaflet failed to load.");
    return;
  }

  map = L.map('map', { zoomControl: true }).setView([23.81, 90.41], 12);

  function addBaseLayer(url, attribution) {
    return L.tileLayer(url, {
      attribution,
      maxZoom: 20,
      crossOrigin: true
    });
  }

  // Primary + fallback (some networks block specific tile hosts)
  const primary = addBaseLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    '&copy; OpenStreetMap contributors'
  );
  const fallback = addBaseLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    '&copy; OpenStreetMap contributors &copy; CARTO'
  );

  let tileErrors = 0;
  primary.on('tileerror', () => {
    tileErrors += 1;
    if (tileErrors === 6) {
      try {
        map.removeLayer(primary);
      } catch {}
      fallback.addTo(map);
      console.warn("Switched map tiles to fallback provider (tile load errors).");
    }
  });

  primary.addTo(map);

  // Add a marker for Dhaka City center
  L.marker([23.81, 90.41]).addTo(map)
    .bindPopup('Dhaka City Center')
    .openPopup();

  // Add markers for zones
  const zoneCoords = {
    1: [23.75, 90.35],
    2: [23.80, 90.40],
    3: [23.85, 90.45],
    4: [23.90, 90.50],
    5: [23.95, 90.55]
  };

  for (let zone in zoneCoords) {
    L.marker(zoneCoords[zone]).addTo(map)
      .bindPopup(`Zone ${zone}`);
  }

  // Fix "blank map" issues caused by late layout sizing
  setTimeout(() => map.invalidateSize(true), 0);
  setTimeout(() => map.invalidateSize(true), 300);
}

initMap();

window.addEventListener("resize", () => {
  if (map) map.invalidateSize(true);
});

</script>

</body>
</html>
